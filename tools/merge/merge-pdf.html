<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merge PDF</title>

<link rel="stylesheet" href="../../ui.css">
<link rel="stylesheet" href="merge-pdf.css">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

</head>

<body>

<header>Merge PDF</header>

<div class="container">

<div class="panel">

<button class="back" onclick="goHome()">← Back</button>

<div id="uploadZone" class="upload-zone">
Drop PDFs here or click to upload
<input type="file" id="fileInput" multiple accept="application/pdf" hidden>
</div>

<div id="fileList" class="file-list"></div>

<button onclick="mergePDFs()">Merge</button>

<div id="successBox" class="success">
Files merged successfully
<button id="downloadBtn">Download</button>
</div>

</div>

</div>

<script src="../../ui.js"></script>
<script src="merge-pdf.js"></script>

</body>
</html>
