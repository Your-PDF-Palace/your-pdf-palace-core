<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delete Pages PDF</title>

<link rel="stylesheet" href="../../ui.css">
<link rel="stylesheet" href="delete-page-pdf.css">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

</head>

<body>

<header>Delete PDF Pages</header>

<div class="container">

<div class="panel">

<button class="back" onclick="goHome()">← Back</button>

<h2>Select pages to delete</h2>

<div id="deleteUpload" class="upload-zone">
Upload a PDF
<input type="file" id="deleteInput" accept="application/pdf" hidden>
</div>

<div id="deleteGrid" class="page-grid"></div>

<button onclick="deletePages()">Create Clean PDF</button>

<div id="deleteSuccess" class="success">
✔ Pages removed successfully
<button id="deleteDownload">Download</button>
</div>

</div>

</div>

<script src="../../ui.js"></script>
<script src="delete-page-pdf.js"></script>

</body>
</html>
